<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OpenPlate.ai – Smart Feedback Kiosk</title>
  <!-- Chart.js for graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: linear-gradient(135deg, #fef9f0 0%, #fff5e6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .app-container {
      width: 100%;
      max-width: 750px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.1);
      padding: 1.8rem;
      border: 1px solid rgba(255,255,255,0.6);
      transition: all 0.3s;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f97316, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-tabs {
      display: flex;
      gap: 0.5rem;
    }
    .nav-btn {
      background: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      color: #4a4a4a;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: 0.2s;
      font-size: 0.9rem;
    }
    .nav-btn.active { background: #f97316; color: white; }
    .view {
      display: none;
      animation: fade 0.3s;
    }
    .view.active { display: block; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

    /* Avatar */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.2rem;
    }
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .face {
      width: 70px;
      height: 70px;
    }
    .rating-row {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin: 1.2rem 0;
      flex-wrap: wrap;
    }
    .star-btn {
      background: white;
      border: 2px solid #ddd;
      font-size: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .star-btn.selected { border-color: #f59e0b; background: #fffbeb; transform: scale(1.05); }
    .comment-box {
      width: 100%;
      margin: 0.8rem 0;
    }
    textarea {
      width: 100%;
      border: 2px solid #eee;
      border-radius: 1.2rem;
      padding: 1rem;
      font-size: 1rem;
      resize: vertical;
      background: white;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
    }
    .submit-btn {
      background: #f97316;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: 0.2s;
      box-shadow: 0 6px 14px rgba(249, 115, 22, 0.3);
    }
    .submit-btn:disabled { background: #ccc; box-shadow: none; }
    .message { text-align: center; margin-top: 0.5rem; font-weight: 600; color: #2e7d32; }

    /* Dashboard */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .dashboard-tabs { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .dash-tab {
      background: #f3f4f6;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
    }
    .dash-tab.active { background: #f97316; color: white; }
    .chart-container { width: 100%; max-width: 500px; margin: 0 auto 1.5rem; }
    .keyword-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 1rem;
    }
    .keyword-badge {
      background: #fef3c7;
      color: #92400e;
      border-radius: 2rem;
      padding: 0.3rem 0.9rem;
      font-weight: 600;
      transition: 0.2s;
    }
    .feedback-excerpt {
      background: white;
      border-radius: 1rem;
      padding: 0.8rem;
      margin: 0.5rem 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      font-style: italic;
    }
    .settings-gear {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      margin-left: 1rem;
    }
    .color-picker-modal {
      display: none;
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -30%);
      background: white;
      padding: 1.5rem;
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      z-index: 100;
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 99;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="top-bar">
      <div class="logo">🍽️ OpenPlate.ai</div>
      <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchView('feedback')">💬 Feedback</button>
        <button class="nav-btn" onclick="switchView('dashboard')">📊 Dashboard</button>
      </div>
    </div>

    <!-- Feedback View -->
    <div id="feedbackView" class="view active">
      <div class="avatar-section">
        <div class="avatar" id="avatarCircle" style="background: #fbbf24;">
          <svg class="face" id="avatarFace" viewBox="0 0 100 100">
            <!-- Eyes -->
            <circle cx="30" cy="35" r="8" fill="white" />
            <circle cx="70" cy="35" r="8" fill="white" />
            <circle cx="30" cy="35" r="4" fill="#1e293b" />
            <circle cx="70" cy="35" r="4" fill="#1e293b" />
            <!-- Mouth (default smile) -->
            <path id="mouthPath" d="M 25 65 Q 50 85 75 65" stroke="#1e293b" stroke-width="5" fill="none" stroke-linecap="round" />
          </svg>
        </div>
        <button class="settings-gear" onclick="openColorPicker()" title="Customise avatar colour">⚙️</button>
      </div>
      <h3 style="text-align:center; color:#4a4a4a;">How was your experience?</h3>
      <div class="rating-row" id="starRow">
        <button class="star-btn" data-rating="1">⭐</button>
        <button class="star-btn" data-rating="2">⭐</button>
        <button class="star-btn" data-rating="3">⭐</button>
        <button class="star-btn" data-rating="4">⭐</button>
        <button class="star-btn" data-rating="5">⭐</button>
      </div>
      <div class="comment-box">
        <textarea id="commentInput" rows="3" placeholder="Tell us why you gave this rating... (optional but helpful)"></textarea>
      </div>
      <div style="text-align:center;">
        <button class="submit-btn" id="submitBtn" disabled onclick="submitFeedback()">Send Feedback</button>
      </div>
      <div class="message" id="feedbackMsg"></div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="view">
      <div class="dashboard-header">
        <h3>📈 Manager Dashboard</h3>
        <button class="nav-btn" onclick="logoutDashboard()" style="font-size:0.8rem;">🔒 Logout</button>
      </div>
      <!-- Password gate if not logged in -->
      <div id="loginGate" style="text-align:center; padding:2rem;">
        <p>Enter manager password:</p>
        <input type="password" id="managerPass" placeholder="Password" style="padding:0.5rem; border-radius:1rem; border:1px solid #ccc;">
        <button class="submit-btn" onclick="loginDashboard()">Unlock</button>
        <p style="font-size:0.8rem; color:#888;">(default: openplate123)</p>
      </div>
      <div id="dashboardContent" style="display:none;">
        <div class="dashboard-tabs">
          <button class="dash-tab active" onclick="switchDashTab('charts')">📊 Charts</button>
          <button class="dash-tab" onclick="switchDashTab('summary')">🗣️ Layman's Summary</button>
          <button class="dash-tab" onclick="switchDashTab('keywords')">🔑 Keywords</button>
          <button class="dash-tab" onclick="switchDashTab('excerpts')">💬 Excerpts</button>
        </div>
        <div id="dashCharts" class="dash-panel">
          <div class="chart-container"><canvas id="ratingChart"></canvas></div>
          <div class="chart-container" style="max-width:350px;"><canvas id="constructiveChart"></canvas></div>
        </div>
        <div id="dashSummary" class="dash-panel" style="display:none; padding:1rem; background:white; border-radius:1rem;">
          <p id="summaryText"></p>
        </div>
        <div id="dashKeywords" class="dash-panel" style="display:none;">
          <div class="keyword-cloud" id="keywordCloud"></div>
        </div>
        <div id="dashExcerpts" class="dash-panel" style="display:none;">
          <div id="excerptsContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Overlay and color picker modal -->
  <div class="overlay" id="overlay" onclick="closeColorPicker()"></div>
  <div class="color-picker-modal" id="colorPickerModal">
    <h4>Pick Avatar Colour</h4>
    <input type="color" id="avatarColorPicker" value="#fbbf24">
    <button class="submit-btn" onclick="saveAvatarColor()">Save</button>
  </div>

  <script>
    (function() {
      // ---------- GLOBAL STATE ----------
      let selectedRating = 0;
      let currentView = 'feedback';
      let dashboardLoggedIn = false;
      let currentDashTab = 'charts';

      // ---------- HELPER: localStorage ----------
      function loadFeedback() {
        const data = localStorage.getItem('openplate_feedback');
        return data ? JSON.parse(data) : [];
      }
      function saveFeedback(feedbackList) {
        localStorage.setItem('openplate_feedback', JSON.stringify(feedbackList));
      }

      // ---------- SIMPLE SENTIMENT / CONSTRUCTIVE FILTER ----------
      const positiveWords = ['good','great','tasty','delicious','friendly','nice','fast','clean','love','excellent','amazing','pleasant'];
      const negativeWords = ['bad','slow','rude','dirty','awful','terrible','horrible','cold','disgusting','worst','poor'];
      const constructivePhrases = ['suggest','could be','would be','maybe','perhaps','recommend','improve','would like','please','if you','i wish','hope','consider','should','it would be better'];
      const profanityList = ['damn','shit','fuck','crap','suck']; // extend as needed

      function analyzeComment(comment) {
        const lower = comment.toLowerCase();
        const length = comment.replace(/\s/g,'').length;
        // Destructive checks
        const allCaps = (comment === comment.toUpperCase() && length > 5);
        const hasProfanity = profanityList.some(w => lower.includes(w));
        const tooShort = length < 15;
        const exclamationOverload = (comment.match(/!/g) || []).length > 3;
        if (tooShort || hasProfanity || allCaps || exclamationOverload) return 'destructive';
        // Constructive checks
        const hasConstructive = constructivePhrases.some(p => lower.includes(p));
        if (hasConstructive) return 'constructive';
        // Sentiment weight
        let posCount = 0, negCount = 0;
        positiveWords.forEach(w => { if(lower.includes(w)) posCount++; });
        negativeWords.forEach(w => { if(lower.includes(w)) negCount++; });
        if (posCount > negCount) return 'constructive';
        if (negCount > posCount && length > 30) return 'constructive'; // longer negative but detailed
        if (negCount > posCount && length <= 30) return 'destructive';
        // Neutral but decent length
        if (length > 20) return 'constructive';
        return 'destructive';
      }

      // ---------- AVATAR EXPRESSION ----------
      function updateAvatarExpression(rating, text) {
        const mouth = document.getElementById('mouthPath');
        if (!mouth) return;
        // Determine mood
        let mood = 'neutral'; // default
        if (rating >= 4) mood = 'happy';
        else if (rating === 3) mood = 'neutral';
        else if (rating <= 2 && rating > 0) mood = 'sad';

        // Override with text analysis if text exists
        if (text && text.trim().length > 0) {
          const lower = text.toLowerCase();
          let pos = 0, neg = 0;
          positiveWords.forEach(w => { if(lower.includes(w)) pos++; });
          negativeWords.forEach(w => { if(lower.includes(w)) neg++; });
          if (pos > neg) mood = 'happy';
          else if (neg > pos) mood = 'sad';
          else mood = 'neutral';
        }

        // Update mouth path
        if (mood === 'happy') mouth.setAttribute('d', 'M 25 65 Q 50 85 75 65');
        else if (mood === 'sad') mouth.setAttribute('d', 'M 25 75 Q 50 55 75 75');
        else mouth.setAttribute('d', 'M 25 67 Q 50 67 75 67'); // straight line
      }

      // ---------- UI HELPERS ----------
      function clearStarSelection() {
        document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('submitBtn').disabled = true;
      }

      // ---------- FEEDBACK SUBMISSION ----------
      window.submitFeedback = function() {
        if (selectedRating === 0) return;
        const comment = document.getElementById('commentInput').value.trim();
        const classification = comment ? analyzeComment(comment) : 'destructive'; // no comment = destructive
        const feedbackEntry = {
          id: Date.now(),
          rating: selectedRating,
          comment: comment || '(no comment)',
          classification: classification,
          timestamp: new Date().toISOString()
        };
        const all = loadFeedback();
        all.push(feedbackEntry);
        saveFeedback(all);

        document.getElementById('feedbackMsg').textContent = 'Thank you! Your feedback helps us improve.';
        document.getElementById('commentInput').value = '';
        clearStarSelection();
        selectedRating = 0;
        updateAvatarExpression(0, '');
        setTimeout(() => { document.getElementById('feedbackMsg').textContent = ''; }, 4000);
      };

      // ---------- RATING BUTTONS ----------
      document.querySelectorAll('.star-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const rating = parseInt(this.dataset.rating);
          selectedRating = rating;
          clearStarSelection();
          this.classList.add('selected');
          document.getElementById('submitBtn').disabled = false;
          updateAvatarExpression(rating, document.getElementById('commentInput').value);
        });
      });

      // Live avatar update on typing
      document.getElementById('commentInput').addEventListener('input', function() {
        updateAvatarExpression(selectedRating, this.value);
      });

      // ---------- VIEW SWITCHING ----------
      window.switchView = function(view) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('feedbackView').classList.remove('active');
        document.getElementById('dashboardView').classList.remove('active');
        if (view === 'feedback') {
          document.getElementById('feedbackView').classList.add('active');
          document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
        } else {
          document.getElementById('dashboardView').classList.add('active');
          document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
          if (dashboardLoggedIn) renderDashboard();
        }
        currentView = view;
      };

      // ---------- DASHBOARD LOGIN ----------
      window.loginDashboard = function() {
        const pass = document.getElementById('managerPass').value;
        if (pass === 'openplate123') { // simple password
          dashboardLoggedIn = true;
          document.getElementById('loginGate').style.display = 'none';
          document.getElementById('dashboardContent').style.display = 'block';
          renderDashboard();
        } else {
          alert('Incorrect password');
        }
      };
      window.logoutDashboard = function() {
        dashboardLoggedIn = false;
        document.getElementById('loginGate').style.display = 'block';
        document.getElementById('dashboardContent').style.display = 'none';
        // destroy any existing charts
        if (window.ratingChartInstance) window.ratingChartInstance.destroy();
        if (window.constructiveChartInstance) window.constructiveChartInstance.destroy();
      };

      // ---------- DASHBOARD TABS ----------
      window.switchDashTab = function(tab) {
        document.querySelectorAll('.dash-tab').forEach(b => b.classList.remove('active'));
        document.getElementById('dashCharts').style.display = 'none';
        document.getElementById('dashSummary').style.display = 'none';
        document.getElementById('dashKeywords').style.display = 'none';
        document.getElementById('dashExcerpts').style.display = 'none';
        if (tab === 'charts') {
          document.getElementById('dashCharts').style.display = 'block';
          document.querySelector('.dash-tab:nth-child(1)').classList.add('active');
          renderCharts();
        } else if (tab === 'summary') {
          document.getElementById('dashSummary').style.display = 'block';
          document.querySelector('.dash-tab:nth-child(2)').classList.add('active');
          renderSummary();
        } else if (tab === 'keywords') {
          document.getElementById('dashKeywords').style.display = 'block';
          document.querySelector('.dash-tab:nth-child(3)').classList.add('active');
          renderKeywords();
        } else if (tab === 'excerpts') {
          document.getElementById('dashExcerpts').style.display = 'block';
          document.querySelector('.dash-tab:nth-child(4)').classList.add('active');
          renderExcerpts();
        }
        currentDashTab = tab;
      };

      function getAllConstructive() {
        return loadFeedback().filter(f => f.classification === 'constructive');
      }

      // ---------- CHARTS ----------
      function renderCharts() {
        const all = loadFeedback();
        const constructive = getAllConstructive();
        const destructive = all.filter(f => f.classification === 'destructive');
        // Rating distribution
        const ratingsCount = [0,0,0,0,0]; // 1-5
        all.forEach(f => { if(f.rating>=1 && f.rating<=5) ratingsCount[f.rating-1]++; });
        const ctx1 = document.getElementById('ratingChart').getContext('2d');
        if (window.ratingChartInstance) window.ratingChartInstance.destroy();
        window.ratingChartInstance = new Chart(ctx1, {
          type: 'bar',
          data: {
            labels: ['1⭐','2⭐','3⭐','4⭐','5⭐'],
            datasets: [{
              label: 'Number of ratings',
              data: ratingsCount,
              backgroundColor: ['#ef4444','#f97316','#eab308','#84cc16','#22c55e']
            }]
          },
          options: { responsive: true, plugins: { legend: { display: false } } }
        });
        // Constructive vs Destructive
        const ctx2 = document.getElementById('constructiveChart').getContext('2d');
        if (window.constructiveChartInstance) window.constructiveChartInstance.destroy();
        window.constructiveChartInstance = new Chart(ctx2, {
          type: 'doughnut',
          data: {
            labels: ['Constructive','Destructive'],
            datasets: [{
              data: [constructive.length, destructive.length],
              backgroundColor: ['#22c55e','#94a3b8']
            }]
          },
          options: { responsive: true }
        });
      }

      function renderSummary() {
        const constructive = getAllConstructive();
        const all = loadFeedback();
        const avgRating = all.length ? (all.reduce((a,b)=>a+b.rating,0)/all.length).toFixed(1) : 'N/A';
        // Simple keyword frequency for praise/complaints
        let praiseWords = {};
        let complainWords = {};
        constructive.forEach(f => {
          const words = f.comment.toLowerCase().split(/\W+/);
          words.forEach(w => {
            if(positiveWords.includes(w)) praiseWords[w] = (praiseWords[w]||0)+1;
            if(negativeWords.includes(w)) complainWords[w] = (complainWords[w]||0)+1;
          });
        });
        const topPraise = Object.entries(praiseWords).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]).join(', ') || 'nothing specific';
        const topComplain = Object.entries(complainWords).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]).join(', ') || 'no major complaints';
        document.getElementById('summaryText').innerHTML = `
          <strong>Average Rating:</strong> ${avgRating} / 5<br>
          <strong>Total Feedback:</strong> ${all.length} (${constructive.length} constructive)<br>
          <strong>Most praised:</strong> ${topPraise}<br>
          <strong>Common complaints:</strong> ${topComplain}<br>
          <em>Based on constructive feedback only.</em>
        `;
      }

      function renderKeywords() {
        const constructive = getAllConstructive();
        const wordFreq = {};
        const stopWords = new Set(['the','a','is','and','it','was','to','of','in','for','on','that','this','with','i','my','me','but','so','very','just','not','they','we','you','your','be','have','has','do','does','are','am','at','no','yes','its','if','or','as','an','by','from','all','can','will','would','could','should','about','been']);
        constructive.forEach(f => {
          const words = f.comment.toLowerCase().split(/\W+/).filter(w => w.length>2 && !stopWords.has(w));
          words.forEach(w => { wordFreq[w] = (wordFreq[w]||0)+1; });
        });
        const sorted = Object.entries(wordFreq).sort((a,b)=>b[1]-a[1]).slice(0,30);
        const cloud = document.getElementById('keywordCloud');
        cloud.innerHTML = '';
        if (sorted.length === 0) {
          cloud.innerHTML = '<p>Not enough constructive feedback yet.</p>';
          return;
        }
        const maxFreq = sorted[0][1];
        sorted.forEach(([word, freq]) => {
          const span = document.createElement('span');
          span.className = 'keyword-badge';
          const size = 0.8 + (freq / maxFreq) * 1.5;
          span.style.fontSize = `${size}rem`;
          span.textContent = word;
          cloud.appendChild(span);
        });
      }

      function renderExcerpts() {
        const constructive = getAllConstructive();
        const container = document.getElementById('excerptsContainer');
        container.innerHTML = '';
        if (constructive.length === 0) {
          container.innerHTML = '<p>No constructive feedback yet.</p>';
          return;
        }
        constructive.slice(-10).reverse().forEach(f => {
          const div = document.createElement('div');
          div.className = 'feedback-excerpt';
          div.innerHTML = `⭐ ${f.rating} – "${f.comment}" <br><small>${new Date(f.timestamp).toLocaleDateString()}</small>`;
          container.appendChild(div);
        });
      }

      function renderDashboard() {
        if (!dashboardLoggedIn) return;
        // default to charts
        switchDashTab('charts');
      }

      // ---------- AVATAR COLOR CUSTOMIZATION ----------
      window.openColorPicker = function() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('colorPickerModal').style.display = 'block';
      };
      window.closeColorPicker = function() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('colorPickerModal').style.display = 'none';
      };
      window.saveAvatarColor = function() {
        const color = document.getElementById('avatarColorPicker').value;
        document.getElementById('avatarCircle').style.background = color;
        localStorage.setItem('openplate_avatarColor', color);
        closeColorPicker();
      };
      // Load saved avatar color
      const savedColor = localStorage.getItem('openplate_avatarColor');
      if (savedColor) {
        document.getElementById('avatarCircle').style.background = savedColor;
        document.getElementById('avatarColorPicker').value = savedColor;
      }

      // Initial expression neutral
      updateAvatarExpression(0, '');
    })();
  </script>
</body>
</html>
